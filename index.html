<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dragon Prophecy</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
  --bg-1:#07101f;
  --bg-2:#0b1730;
  --panel:rgba(8,16,34,.9);
  --panel-2:rgba(16,29,56,.92);
  --line:rgba(173,216,255,.15);
  --text:#ecf4ff;
  --muted:#b8c8e6;
  --button:#1a2b4c;
  --button-hover:#27406e;
}

body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
  color:var(--text);
  padding:20px;
}

#app { max-width:920px; margin:auto; }

.page-meta {
  max-width:920px;
  margin:12px auto 0;
  color:var(--muted);
  font-size:14px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.hud {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  padding:10px;
}

.hud-card {
  background:rgba(255,255,255,.05);
  padding:10px;
  border-radius:10px;
}

.scene {
  position:relative;
  padding:20px;
  border-radius:16px;
  overflow:hidden;
}

.fade-in {
  animation:fade .45s ease;
}

.scene.has-background {
  min-height:420px;
}

.scene-background {
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-color:#10213c;
}

.scene-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(5,10,22,.35),rgba(5,10,22,.72));
}

.scene-content {
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  gap:14px;
}

@keyframes fade {
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

.scene-image-wrap {
  display:flex;
  justify-content:center;
  position:relative;
  border-radius:16px;
  overflow:hidden;
  order:2;
}

.scene-image {
  width:100%;
  max-width:700px;
  margin:0 auto;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:16px;
  display:block;
}

.npc-layer {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
}

.npc {
  position:absolute;
  bottom:0;
  width:100%;
  max-width:250px;
  height:auto;
  animation:float 4s ease-in-out infinite;
}

.character-image {
  width:100%;
  max-width:200px;
  height:auto;
}

.npc.right { right:72px; }
.npc.left { left:72px; }

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.scene-panel,
.scene-header,
.scene-actions {
  background:var(--panel-2);
  padding:16px;
  border-radius:12px;
}

.message-box {
  padding:12px 14px;
  border-radius:12px;
  background:rgba(7,16,31,.82);
  border:1px solid var(--line);
  color:var(--text);
  order:3;
  white-space:pre-line;
}

.objective-box {
  padding:12px 14px;
  border-radius:12px;
  background:rgba(24,40,72,.82);
  border:1px solid var(--line);
  color:var(--text);
  order:0;
}

.scene-panel {
  order:1;
}

.scene-header {
  order:1;
}

.scene-actions {
  order:4;
}

.npc-card {
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  background:rgba(9,18,38,.45);
  border:1px solid var(--line);
  text-align:center;
  max-width:200px;
}

.npc-inline {
  position:static;
  display:block;
  margin:0 auto 10px;
}

.npc-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:16px;
  margin-top:20px;
}

.world-map-wrap {
  position:relative;
  width:100%;
  margin-top:16px;
  border-radius:16px;
  overflow:hidden;
  background:rgba(255,255,255,.04);
}

.world-map-image {
  display:block;
  width:100%;
  height:auto;
}

.world-map-markers {
  position:absolute;
  inset:0;
}

.world-map-marker {
  position:absolute;
  width:auto;
  margin-top:0;
  padding:0;
  background:transparent;
  border:none;
  box-shadow:none;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
  transition:transform .18s ease;
}

.world-map-marker:hover {
  transform:translate(-50%,-52%) scale(1.03);
}

.world-map-marker-dot {
  width:18px;
  height:18px;
  border-radius:999px;
  background:#cfe7ff;
  border:3px solid #1a2b4c;
  box-shadow:0 0 0 4px rgba(7,16,31,.35);
}

.world-map-marker-label {
  max-width:180px;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(20,39,71,.92);
  border:1px solid var(--line);
  color:var(--text);
  font-size:13px;
  line-height:1.2;
  text-align:center;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--button);
  color:white;
  cursor:pointer;
}

button:hover { background:var(--button-hover); }

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.meta-button {
  width:auto;
  margin-top:0;
  padding:8px 14px;
}

@media (max-width: 600px) {
  body {
    padding:12px;
  }

  .scene {
    padding:12px;
  }

  .scene-panel,
  .scene-header,
  .scene-actions {
    padding:14px;
  }

  .hud {
    grid-template-columns:repeat(2,1fr);
  }

  .npc,
  .character-image {
    max-width:180px;
  }

  button:not(.world-map-button),
  input,
  select {
    width:100%;
  }

  .dragon-builder-grid {
    grid-template-columns:1fr;
  }

  .world-map-marker-label {
    max-width:120px;
    padding:6px 8px;
    font-size:11px;
  }
}

.toast-container {
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:1000;
  pointer-events:none;
}

.toast {
  min-width:220px;
  max-width:320px;
  padding:12px 14px;
  border-radius:12px;
  background:rgba(8,16,34,.95);
  color:var(--text);
  border:1px solid var(--line);
  box-shadow:0 12px 28px rgba(0,0,0,.28);
  transition:opacity .25s ease, transform .25s ease;
}

.toast-hide {
  opacity:0;
  transform:translateY(8px);
}

.footer-button {
  width:100%;
  margin-top:0;
}

.dragon-builder-shell {
  display:flex;
  flex-direction:column;
  gap:18px;
}

.dragon-builder-grid {
  display:grid;
  grid-template-columns:minmax(280px, 1fr) minmax(300px, 1.1fr);
  gap:18px;
  align-items:stretch;
}

.dragon-builder-form,
.dragon-preview-card {
  background:rgba(9,18,38,.5);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
}

.dragon-builder-form label {
  display:block;
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

.dragon-builder-form input[type="color"] {
  height:48px;
  padding:6px;
  background:#091226;
}

.dragon-builder-actions {
  margin-top:16px;
}

.dragon-preview-card {
  display:flex;
  flex-direction:column;
  gap:12px;
  justify-content:space-between;
}

.dragon-preview-meta h2,
.dragon-preview-meta p {
  margin:0;
}

.dragon-preview-label {
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:12px;
  margin-bottom:6px;
}

.dragon-preview {
  border-radius:18px;
  overflow:hidden;
  background:radial-gradient(circle at top, rgba(255,255,255,.1), rgba(255,255,255,0) 55%), linear-gradient(180deg,#12284a,#091226);
  border:1px solid rgba(255,255,255,.08);
  min-height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.dragon-preview-svg {
  width:100%;
  height:auto;
  display:block;
}

#dragon-preview {
  position:relative;
  width:100%;
  max-width:400px;
  aspect-ratio:1 / 1;
}

.dragon {
  position:relative;
  width:100%;
  height:100%;
  animation:dragon-idle 4s ease-in-out infinite;
}

.dragon-fade {
  animation:dragon-fade .3s ease, dragon-idle 4s ease-in-out .3s infinite;
}

.dragon-layer {
  position:absolute;
  width:100%;
  top:0;
  left:0;
  transition:all .3s ease;
  display:block;
  user-select:none;
  pointer-events:none;
}

.dragon-shadow {
  position:absolute;
  left:50%;
  bottom:7%;
  width:58%;
  height:11%;
  transform:translateX(-50%);
  border-radius:999px;
  background:radial-gradient(circle, rgba(0,0,0,.3) 0%, rgba(0,0,0,.09) 60%, rgba(0,0,0,0) 100%);
  filter:blur(8px);
}

@keyframes dragon-fade {
  from {
    opacity:0;
    transform:translateY(8px);
  }

  to {
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes dragon-idle {
  0%,100% {
    transform:translateY(0);
  }

  50% {
    transform:translateY(-4px);
  }
}
</style>
</head>

<body>
<div id="app"></div>
<div id="toast-container" class="toast-container"></div>
<div class="page-meta">
  <button id="dragonBuilderFooterButton" class="meta-button" style="display:none;" onclick="Game.openDragonBuilder()">Create Your Dragon</button>
  <span>Last updated: <span id="lastModified"></span></span>
  <button class="meta-button" onclick="logoutGame()">Log out</button>
</div>
<script src="systems/supabase.js?v=20260406-3"></script>
<script src="systems/inventory.js?v=20260404-6"></script>
<script src="systems/quests.js?v=20260404-6"></script>
<script src="systems/relationships.js?v=20260404-6"></script>
<script src="scenes/intro.js?v=20260404-6"></script>
<script src="scenes/login.js?v=20260404-6"></script>
<script src="scenes/name.js?v=20260404-6"></script>
<script src="scenes/user-check.js?v=20260406-2"></script>
<script src="scenes/dragon-select.js?v=20260406-2"></script>
<script src="scenes/create-dragon.js?v=20260404-6"></script>
<script src="scenes/dragon-builder.js?v=20260406-4"></script>
<script src="scenes/world-map.js?v=20260404-6"></script>
<script src="scenes/hunt.js?v=20260404-6"></script>
<script src="scenes/ice-hunt.js?v=20260404-6"></script>
<script src="scenes/sand-hunt.js?v=20260404-6"></script>
<script src="scenes/sky-hunt.js?v=20260404-6"></script>
<script src="scenes/sea-kingdom.js?v=20260404-6"></script>
<script src="scenes/rainforest-kingdom.js?v=20260404-6"></script>
<script src="scenes/rainforest-hunt.js?v=20260404-6"></script>
<script src="scenes/banyan.js?v=20260404-6"></script>
<script src="scenes/personality.js?v=20260404-6"></script>
<script src="scenes/ice-palace.js?v=20260404-6"></script>
<script src="scenes/lynx.js?v=20260404-6"></script>
<script src="scenes/cliff.js?v=20260404-6"></script>
<script src="scenes/viper.js?v=20260404-6"></script>
<script src="scenes/glacier.js?v=20260404-6"></script>
<script src="game.js?v=20260406-4"></script>
<script>
document.getElementById("lastModified").textContent = new Date(document.lastModified).toLocaleString();
const dragonBuilderFooterButton = document.getElementById("dragonBuilderFooterButton");
if (dragonBuilderFooterButton && localStorage.getItem("dragonUser") === "Mike") {
  dragonBuilderFooterButton.style.display = "inline-block";
}
window.logoutGame = function () {
  localStorage.removeItem("dragonUser");
  localStorage.removeItem("dragonPlayer");
  window.location.reload();
};
</script>
</body>
</html>
