<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dragon Prophecy</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
  --bg-1:#07101f;
  --bg-2:#0b1730;
  --panel:rgba(8,16,34,.9);
  --panel-2:rgba(16,29,56,.92);
  --line:rgba(173,216,255,.15);
  --text:#ecf4ff;
  --muted:#b8c8e6;
  --button:#1a2b4c;
  --button-hover:#27406e;
}

body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
  color:var(--text);
  padding:20px;
}

#app { max-width:920px; margin:auto; }

.page-meta {
  max-width:920px;
  margin:12px auto 0;
  color:var(--muted);
  font-size:14px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:12px;
}

.hud {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  padding:10px;
}

.hud-card {
  background:rgba(255,255,255,.05);
  padding:10px;
  border-radius:10px;
}

.scene {
  position:relative;
  padding:20px;
  animation:fade .4s ease;
  border-radius:16px;
  overflow:hidden;
}

.scene.has-background {
  min-height:420px;
}

.scene-background {
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-color:#10213c;
}

.scene-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(5,10,22,.35),rgba(5,10,22,.72));
}

.scene-content {
  position:relative;
  z-index:1;
}

@keyframes fade {
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

.scene-image-wrap {
  position:relative;
  border-radius:16px;
  overflow:hidden;
}

.scene-image {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.npc-layer {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
}

.npc {
  position:absolute;
  bottom:0;
  height:300px;
  animation:float 4s ease-in-out infinite;
}

.npc.right { right:20px; }
.npc.left { left:20px; }

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.scene-panel {
  background:var(--panel-2);
  padding:16px;
  border-radius:12px;
}

.world-map-wrap {
  position:relative;
  width:100%;
  margin-top:16px;
  border-radius:16px;
  overflow:hidden;
  background:rgba(255,255,255,.04);
}

.world-map-image {
  display:block;
  width:100%;
  height:auto;
}

.world-map-button {
  position:absolute;
  width:auto;
  min-width:140px;
  margin-top:0;
  padding:10px 14px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
  transition:transform .18s ease, background .18s ease;
}

.world-map-button:hover {
  transform:translateY(-2px) scale(1.02);
}

.world-map-ice {
  top:11%;
  left:9%;
}

.world-map-sky {
  top:16%;
  right:10%;
}

.world-map-sand {
  bottom:9%;
  right:12%;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--button);
  color:white;
  cursor:pointer;
}

button:hover { background:var(--button-hover); }

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.meta-button {
  width:auto;
  margin-top:0;
  padding:8px 14px;
}
</style>
</head>

<body>
<div id="app"></div>
<div class="page-meta">
  <span>Last updated: <span id="lastModified"></span></span>
  <button class="meta-button" onclick="logoutGame()">Log out</button>
</div>
<script src="systems/supabase.js"></script>
<script src="systems/inventory.js"></script>
<script src="systems/quests.js"></script>
<script src="systems/relationships.js"></script>
<script src="scenes/intro.js"></script>
<script src="scenes/login.js"></script>
<script src="scenes/name.js"></script>
<script src="scenes/user-check.js"></script>
<script src="scenes/dragon-select.js"></script>
<script src="scenes/create-dragon.js"></script>
<script src="scenes/world-map.js"></script>
<script src="scenes/personality.js"></script>
<script src="scenes/ice-palace.js"></script>
<script src="scenes/lynx.js"></script>
<script src="scenes/cliff.js"></script>
<script src="scenes/viper.js"></script>
<script src="scenes/glacier.js"></script>
<script src="game.js"></script>
<script>
document.getElementById("lastModified").textContent = new Date(document.lastModified).toLocaleString();
window.logoutGame = function () {
  localStorage.removeItem("dragonUser");
  localStorage.removeItem("dragonPlayer");
  window.location.reload();
};
</script>
</body>
</html>
