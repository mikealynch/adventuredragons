<!DOCTYPE html>
<html>
<head>
  <title>Dragon Prophecy</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#0f172a, #020617);
      color: white;
    }

    #app {
      max-width: 700px;
      margin: 40px auto;
      padding: 25px;
      background: #0b1220;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    button {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1e293b;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #334155;
      transform: translateY(-1px);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    .npc-card {
      text-align: center;
      margin-bottom: 20px;
    }

    .npc-card img {
      width: 220px;
      border-radius: 14px;
      margin-bottom: 10px;
    }

    .hud {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script src="game.js"></script>
</body>
</html>
