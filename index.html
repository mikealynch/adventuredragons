<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Prophecy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    :root {
      --bg-1: #07101f;
      --bg-2: #0b1730;
      --panel: rgba(8, 16, 34, 0.9);
      --panel-2: rgba(16, 29, 56, 0.92);
      --line: rgba(173, 216, 255, 0.15);
      --text: #ecf4ff;
      --muted: #b8c8e6;
      --button: #1a2b4c;
      --button-hover: #27406e;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #16315f 0%, transparent 35%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      padding: 24px;
    }

    #app {
      max-width: 920px;
      margin: 0 auto;
    }

    .game-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(23, 42, 78, 0.96), rgba(12, 22, 42, 0.96));
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .hud-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 64px;
    }

    .hud-label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .scene {
      padding: 20px;
      animation: sceneFadeIn 420ms ease;
    }

    @keyframes sceneFadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .scene-image-wrap {
      position: relative;
      margin-bottom: 18px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #0a1427;
    }

    .scene-image {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      transform: scale(1.01);
    }

    .scene-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(7, 11, 23, 0.08), rgba(7, 11, 23, 0.2));
      pointer-events: none;
    }

    .npc-overlay {
      position: absolute;
      bottom: 0;
      width: min(28%, 220px);
      max-height: 88%;
      object-fit: contain;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.45));
      animation: npcFloat 3.8s ease-in-out infinite;
      pointer-events: none;
    }

    .npc-right {
      right: 22px;
    }

    .npc-left {
      left: 22px;
    }

    @keyframes npcFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    .scene-panel {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }

    h1, h2, h3 {
      margin: 0 0 10px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .button-group {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 14px;
      background: var(--button);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.06);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 16px;
      outline: none;
      margin: 8px 0 14px;
    }

    input::placeholder {
      color: #a8b9d8;
    }

    .choice-row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .quote {
      font-style: italic;
      color: #dbe9ff;
      margin-bottom: 16px;
    }

    .tiny-note {
      font-size: 13px;
      color: #9eb1d5;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .hud {
        grid-template-columns: 1fr 1fr;
      }

      .choice-row {
        grid-template-columns: 1fr;
      }

      .npc-overlay {
        width: min(36%, 180px);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="game.js"></script>
</body>
</html>
